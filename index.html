<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>😊 قاموس السعادة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#ff6ec7;--c2:#ffb347;--c3:#7ec8e3;
  --special:#43cea2;--nouns:#f7971e;--verbs:#7b2ff7;
  --connectors:#f953c6;--opinions:#e65c00;--adjectives:#11998e;
}
body{
  font-family:'Tajawal',sans-serif;
  background:linear-gradient(135deg,#e8f4ff 0%,#fce4ec 45%,#fffde7 80%,#d4f5e9 100%);
  min-height:100vh;
  padding-bottom:60px;
}

/* HEADER */
header{text-align:center;padding:28px 16px 12px;position:relative;z-index:2}
.hbubble{
  display:inline-block;
  background:linear-gradient(135deg,#ff6ec7,#ffb347,#7ec8e3);
  border-radius:28px;padding:16px 40px;
  box-shadow:0 8px 28px rgba(255,110,199,.3);
}
.hbubble h1{font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,5vw,2.8rem);color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.2)}
.hbubble p{color:rgba(255,255,255,.92);font-size:.92rem;margin-top:4px;font-weight:500}

/* TABS */
.tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:18px 14px 6px;position:relative;z-index:2}
.tb{
  font-family:'Tajawal',sans-serif;font-size:.9rem;font-weight:700;
  padding:9px 18px;border:none;border-radius:50px;cursor:pointer;
  background:#fff;color:#555;
  box-shadow:0 3px 10px rgba(0,0,0,.1);
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
}
.tb:hover{transform:translateY(-3px) scale(1.05)}
.tb.on{color:#fff;transform:translateY(-3px) scale(1.06);box-shadow:0 8px 22px rgba(0,0,0,.18)}
.tb[data-c="all"].on     {background:linear-gradient(135deg,#ff6ec7,#ffb347)}
.tb[data-c="special"].on {background:linear-gradient(135deg,#43cea2,#185a9d)}
.tb[data-c="nouns"].on   {background:linear-gradient(135deg,#f7971e,#ffd200);color:#5a3000}
.tb[data-c="verbs"].on   {background:linear-gradient(135deg,#4776e6,#8e54e9)}
.tb[data-c="con"].on     {background:linear-gradient(135deg,#f953c6,#b91d73)}
.tb[data-c="op"].on      {background:linear-gradient(135deg,#e65c00,#f9d423);color:#4a1800}
.tb[data-c="adj"].on     {background:linear-gradient(135deg,#11998e,#38ef7d);color:#044040}

/* SEARCH */
.sw{display:flex;justify-content:center;padding:10px 16px 4px}
.si{
  font-family:'Tajawal',sans-serif;font-size:1rem;
  padding:11px 20px;border-radius:50px;
  border:2px solid #e0e0e0;outline:none;
  width:100%;max-width:400px;text-align:right;
  box-shadow:0 3px 8px rgba(0,0,0,.07);
  transition:border-color .2s,box-shadow .2s;background:#fff;color:#333;
}
.si:focus{border-color:#ff6ec7;box-shadow:0 0 0 3px rgba(255,110,199,.18)}

/* COUNT */
.cnt{text-align:center;color:#999;font-size:.82rem;padding:4px;margin-bottom:4px}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:18px;padding:16px 22px;
  max-width:1400px;margin:0 auto;
}

/* CARD */
.card{
  background:#fff;border-radius:22px;
  box-shadow:0 5px 20px rgba(0,0,0,.09);
  padding:20px 16px 16px;
  display:flex;flex-direction:column;align-items:center;gap:9px;
  border:2.5px solid transparent;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .22s;
  animation:ci .45s cubic-bezier(.34,1.56,.64,1) both;
  position:relative;overflow:hidden;
}
@keyframes ci{from{opacity:0;transform:translateY(28px) scale(.9)}to{opacity:1;transform:none}}
.card:hover{transform:translateY(-7px) scale(1.02);box-shadow:0 16px 38px rgba(0,0,0,.13)}

.card[data-c="special"]  {border-color:#43cea2;background:linear-gradient(160deg,#eefffa 0%,#fff 55%)}
.card[data-c="nouns"]    {border-color:#ffd200;background:linear-gradient(160deg,#fffbe5 0%,#fff 55%)}
.card[data-c="verbs"]    {border-color:#8e54e9;background:linear-gradient(160deg,#f2eeff 0%,#fff 55%)}
.card[data-c="con"]      {border-color:#f953c6;background:linear-gradient(160deg,#ffeefb 0%,#fff 55%)}
.card[data-c="op"]       {border-color:#e65c00;background:linear-gradient(160deg,#fff4ec 0%,#fff 55%)}
.card[data-c="adj"]      {border-color:#38ef7d;background:linear-gradient(160deg,#edfff4 0%,#fff 55%)}

/* EMOJI SPHERE */
.esph{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;line-height:1;
  filter:drop-shadow(0 5px 12px rgba(0,0,0,.18));
  animation:ef 3s ease-in-out infinite;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1),filter .25s;
  flex-shrink:0;
}
.card:hover .esph{transform:scale(1.2) rotate(-8deg);animation:none;filter:drop-shadow(0 10px 20px rgba(0,0,0,.22))}
@keyframes ef{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

.card[data-c="special"] .esph{background:radial-gradient(circle at 35% 35%,#a8f0d8,#1db87c 60%,#0a6640)}
.card[data-c="nouns"]   .esph{background:radial-gradient(circle at 35% 35%,#ffe680,#f7971e 60%,#a85400)}
.card[data-c="verbs"]   .esph{background:radial-gradient(circle at 35% 35%,#cbb4f8,#7b2ff7 60%,#3a0099)}
.card[data-c="con"]     .esph{background:radial-gradient(circle at 35% 35%,#ffb3ec,#f953c6 60%,#8f0064)}
.card[data-c="op"]      .esph{background:radial-gradient(circle at 35% 35%,#ffd699,#e65c00 60%,#7a2f00)}
.card[data-c="adj"]     .esph{background:radial-gradient(circle at 35% 35%,#b8f7d4,#11998e 60%,#065450)}

/* WORD */
.aw{font-size:1.35rem;font-weight:900;text-align:center;line-height:1.3}
.card[data-c="special"] .aw{color:#0a6640}
.card[data-c="nouns"]   .aw{color:#a85400}
.card[data-c="verbs"]   .aw{color:#3a0099}
.card[data-c="con"]     .aw{color:#8f0064}
.card[data-c="op"]      .aw{color:#7a2f00}
.card[data-c="adj"]     .aw{color:#065450}

/* BADGE */
.badge{
  font-size:.88rem;font-weight:700;
  padding:4px 14px;border-radius:20px;color:#fff;
}
.card[data-c="special"] .badge{background:linear-gradient(90deg,#43cea2,#185a9d)}
.card[data-c="nouns"]   .badge{background:linear-gradient(90deg,#f7971e,#ffd200);color:#5a3000}
.card[data-c="verbs"]   .badge{background:linear-gradient(90deg,#4776e6,#8e54e9)}
.card[data-c="con"]     .badge{background:linear-gradient(90deg,#f953c6,#b91d73)}
.card[data-c="op"]      .badge{background:linear-gradient(90deg,#e65c00,#f9d423);color:#4a1800}
.card[data-c="adj"]     .badge{background:linear-gradient(90deg,#11998e,#38ef7d);color:#044040}

/* EXAMPLE */
.ex{
  font-size:.85rem;color:#666;text-align:center;
  line-height:1.65;padding:6px 8px;
  background:rgba(0,0,0,.03);border-radius:10px;width:100%;
}

/* SOUND BTN */
.sbtn{
  width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;
  font-size:1.5rem;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.15);
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
.sbtn:hover{transform:scale(1.18);box-shadow:0 8px 22px rgba(0,0,0,.2)}
.sbtn:active{transform:scale(.93)}
.sbtn.playing{animation:spin .6s ease}
@keyframes spin{0%{transform:scale(1.3) rotate(0)}50%{transform:scale(1.1) rotate(-20deg)}100%{transform:scale(1) rotate(0)}}

.card[data-c="special"] .sbtn{background:linear-gradient(135deg,#43cea2,#185a9d)}
.card[data-c="nouns"]   .sbtn{background:linear-gradient(135deg,#f7971e,#ffd200)}
.card[data-c="verbs"]   .sbtn{background:linear-gradient(135deg,#4776e6,#8e54e9)}
.card[data-c="con"]     .sbtn{background:linear-gradient(135deg,#f953c6,#b91d73)}
.card[data-c="op"]      .sbtn{background:linear-gradient(135deg,#e65c00,#f9d423)}
.card[data-c="adj"]     .sbtn{background:linear-gradient(135deg,#11998e,#38ef7d)}

/* PULSE ring on play */
.card.playing{animation:ring .5s ease}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(100,180,255,.4)}70%{box-shadow:0 0 0 16px rgba(100,180,255,0)}100%{box-shadow:0 5px 20px rgba(0,0,0,.09)}}

/* NO RESULTS */
.nores{text-align:center;padding:60px 20px;color:#ccc;font-size:1.2rem;grid-column:1/-1}

/* TOAST */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(30,30,30,.92);color:#fff;
  padding:11px 26px;border-radius:22px;
  font-family:'Tajawal',sans-serif;font-size:.95rem;
  z-index:9999;opacity:0;
  transition:opacity .3s,transform .3s;
  pointer-events:none;white-space:nowrap;max-width:92vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* FLOATING STARS */
.star{position:fixed;pointer-events:none;font-size:1.3rem;animation:fs linear infinite;z-index:0}
@keyframes fs{0%{transform:translateY(0) rotate(0);opacity:.7}100%{transform:translateY(-100vh) rotate(360deg);opacity:0}}

/* RESPONSIVE */
@media(max-width:500px){
  .grid{grid-template-columns:repeat(2,1fr);gap:12px;padding:12px}
  .card{padding:14px 10px 12px;gap:7px;border-radius:18px}
  .esph{width:58px;height:58px;font-size:2rem}
  .aw{font-size:1.1rem}
  .badge{font-size:.78rem;padding:3px 10px}
  .ex{font-size:.78rem}
  .sbtn{width:42px;height:42px;font-size:1.3rem}
  .hbubble{padding:12px 22px}
  .tb{font-size:.82rem;padding:7px 13px}
}
</style>
</head>
<body>

<header>
  <div class="hbubble">
    <h1>😊 قاموس السعادة ✨</h1>
    <p>الأستاذ محمود · اضغط 🔊 لسماع الكلمة والمثال</p>
  </div>
</header>

<div class="sw">
  <input class="si" id="Q" type="text" placeholder="🔍 ابحث عن كلمة..." oninput="render()">
</div>

<div class="tabs">
  <button class="tb on" data-c="all"     onclick="setCat('all',this)">🌈 الكل</button>
  <button class="tb"    data-c="special" onclick="setCat('special',this)">✨ كلمات الدرس</button>
  <button class="tb"    data-c="nouns"   onclick="setCat('nouns',this)">🟡 الأسماء</button>
  <button class="tb"    data-c="verbs"   onclick="setCat('verbs',this)">🔵 الأفعال</button>
  <button class="tb"    data-c="con"     onclick="setCat('con',this)">🟣 أدوات الربط</button>
  <button class="tb"    data-c="op"      onclick="setCat('op',this)">🟠 عبارات الرأي</button>
  <button class="tb"    data-c="adj"     onclick="setCat('adj',this)">🌿 الصفات</button>
</div>

<p class="cnt" id="CNT"></p>
<div class="grid" id="GRID"></div>
<div id="toast"></div>

/* ============================================================
   TTS — Web Speech API (يعمل على جميع الأجهزة والمتصفحات)
============================================================ */
let arVoice = null;

function loadVoices(){
  if(!window.speechSynthesis) return;
  const voices = speechSynthesis.getVoices();
  arVoice = voices.find(v=>v.lang==='ar-SA')
         || voices.find(v=>v.lang==='ar-EG')
         || voices.find(v=>v.lang==='ar-AE')
         || voices.find(v=>v.lang.startsWith('ar'))
         || null;
}

if(window.speechSynthesis){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function say(word, example){
  if(!window.speechSynthesis){
    toast('متصفحك لا يدعم ميزة الصوت.');
    return;
  }
  speechSynthesis.cancel();
  setTimeout(()=>{
    const text = word + ' ... ' + example;
    const u = new SpeechSynthesisUtterance(text);
    u.lang   = 'ar-SA';
    u.rate   = 0.82;
    u.pitch  = 1.05;
    u.volume = 1;
    if(arVoice) u.voice = arVoice;
    u.onerror = (e)=>{
      if(e.error !== 'interrupted'){
        toast('تأكد من رفع صوت الجهاز.');
      }
    };
    speechSynthesis.speak(u);
    /* Chrome watchdog */
    const wd = setInterval(()=>{
      if(!speechSynthesis.speaking){ clearInterval(wd); return; }
      if(speechSynthesis.paused) speechSynthesis.resume();
    }, 300);
    setTimeout(()=>clearInterval(wd), 15000);
  }, 120);
}

let CAT='all';

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

function render(){
  const grid=document.getElementById('GRID');
  const q=document.getElementById('Q').value.trim();
  grid.innerHTML='';
  let n=0;
  W.forEach((w,i)=>{
    if(CAT!=='all'&&w.c!==CAT) return;
    if(q&&!w.w.includes(q)&&!w.t.toLowerCase().includes(q.toLowerCase())&&!w.x.includes(q)) return;
    n++;
    const d=document.createElement('div');
    d.className='card'; d.dataset.c=w.c;
    d.style.animationDelay=(n*.038)+'s';
    /* Escape apostrophes for onclick */
    const sw=w.w.replace(/'/g,'&#39;');
    const sx=w.x.replace(/'/g,'&#39;');
    d.innerHTML=
      `<div class="esph">${w.e}</div>`+
      `<div class="aw">${w.w}</div>`+
      `<div class="badge">${w.t}</div>`+
      `<div class="ex">${w.x}</div>`+
      `<button class="sbtn" aria-label="استمع" `+
        `ontouchstart="event.stopPropagation();play(this,'${sw}','${sx}')" `+
        `onclick="event.stopPropagation();play(this,'${sw}','${sx}')">🔊</button>`;
    d.addEventListener('click',()=>play(null,w.w,w.x));
    grid.appendChild(d);
  });
  document.getElementById('CNT').textContent=n+' كلمة';
  if(!n) grid.innerHTML='<div class="nores">🔍 لا توجد نتائج...</div>';
}

function play(btn,word,example){
  /* Visual feedback */
  const card=btn?btn.closest('.card'):null;
  if(card){ card.classList.add('playing'); setTimeout(()=>card.classList.remove('playing'),700); }
  if(btn){  btn.classList.add('playing');  setTimeout(()=>btn.classList.remove('playing'),600); }
  say(word, example);
}

function setCat(c,btn){
  CAT=c;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

/* Floating stars */
(function(){
  const em=['⭐','✨','🌟','💫','🌸','🎈','🎉','💥','🌈'];
  for(let i=0;i<16;i++){
    const s=document.createElement('div');
    s.className='star';
    s.textContent=em[Math.floor(Math.random()*em.length)];
    s.style.cssText=`left:${Math.random()*100}%;bottom:-30px;`+
      `animation-duration:${5+Math.random()*7}s;animation-delay:${Math.random()*10}s`;
    document.body.appendChild(s);
  }
})();

/* Init */
render();
</script>
